tasks:
  - name: aws-cli
    env:
      AWS_CLI_AUTO_PROMPT: on-partial
    init: |
      echo "INIT RAN" > /workspaces/aws-bootcamp-cruddur-2023/init-proof.txt
      pwd >> /workspaces/aws-bootcamp-cruddur-2023/init-proof.txt
      ls -la >> /workspaces/aws-bootcamp-cruddur-2023/init-proof.txt
      cd /workspaces/aws-bootcamp-cruddur-2023
      curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      unzip -o awscliv2.zip
      sudo ./aws/install
      aws --version >> /workspaces/aws-bootcamp-cruddur-2023/init-proof.txt 2>&1

vscode:
  extensions:
    - 42Crunch.vscode-openapi